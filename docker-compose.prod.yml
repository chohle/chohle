# Production deploy: the Nitro prod build behind Caddy (automatic HTTPS).
#
# On the server:
#   1. Point a DNS A record for your domain at this host's IP.
#   2. cp .env.example .env  &&  edit it (DOMAIN, CHOHLE_SECRET,
#      NUXT_SESSION_PASSWORD, admin creds, CHOHLE_DEMO).
#   3. docker compose -f docker-compose.prod.yml up -d --build
#
# Caddy fetches a Let's Encrypt certificate for $DOMAIN on first boot, so the
# domain must already resolve here and ports 80/443 must be open.
services:
  app:
    build:
      context: .
      target: prod
    restart: unless-stopped
    environment:
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
      # SQLite db, uploads and (in demo mode) per-session sandboxes all live on
      # the persistent volume below. On a Linux host a normal volume is safe for
      # SQLite — the fsync/locking corruption only affects macOS Docker bind mounts.
      - DATABASE_PATH=/app/data/chohle.db
      - DEMO_DATA_PATH=/app/data/demo
    env_file:
      - .env
    volumes:
      - appdata:/app/data
    # Not published to the host — only Caddy reaches it over the compose network.
    expose:
      - '3000'

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  # Optional local LLM for the in-app assistant. Only starts with the `llm`
  # profile: `docker compose -f docker-compose.prod.yml --profile llm up -d`.
  # Pull a model once (`... exec ollama ollama pull qwen2.5:7b`) and set
  # CHOHLE_ASSISTANT=true in .env. Needs real RAM (an 8B model wants ~8 GB); on
  # a small box use a 3B model or point NUXT_LLM_BASE_URL at an external
  # endpoint. The app reaches it at http://ollama:11434/v1.
  ollama:
    image: ollama/ollama:latest
    profiles: [llm]
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama

volumes:
  appdata:
  caddy_data:
  caddy_config:
  ollama_data:
