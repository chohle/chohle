name: Auto assign

# Assigns every new issue and PR (including Renovate / CodeRabbit ones) to the
# maintainer, so nothing sits unowned in the queue. Dependency-free — no Probot.
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // 👉 Change this if your GitHub username isn't "zeaiso"
            const MAINTAINER = "zeaiso";
            const isPR = Boolean(context.payload.pull_request);
            const number = isPR
              ? context.payload.pull_request.number
              : context.payload.issue.number;
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              assignees: [MAINTAINER],
            });
