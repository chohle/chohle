name: Auto assign

# Auto-assign the maintainer (and request review) on every new PR — incl.
# Renovate / CodeRabbit ones — via kentaro-m/auto-assign-action, configured in
# .github/auto_assign.yml. Same approach Outline uses.
on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - uses: kentaro-m/auto-assign-action@v2.0.2
