# Dev environment: Nuxt app + Mailpit. Run with `docker compose up`.
services:
  app:
    build:
      context: .
      target: dev
    ports:
      - '3000:3000'
    volumes:
      # Bind-mount source for hot reload, but keep the container's own
      # node_modules (native modules are built for Linux, not the host).
      - .:/app
      - node_modules:/app/node_modules
      - ./data:/app/data
      # SQLite databases (the main db and every per-session demo sandbox) live
      # on a NAMED VOLUME, not the ./data bind mount. SQLite over a macOS Docker
      # bind mount (gRPC-FUSE/virtiofs) doesn't honor fsync/locking and corrupts
      # the file; a named volume is backed by the VM's ext4, where it's safe.
      - dbdata:/app/dbdata
    environment:
      - DOCKER=true
      - DATABASE_PATH=/app/dbdata/chohle.db
      # Per-session demo sandboxes also go on the safe volume. CHOHLE_DEMO is
      # off here; set it to 'true' to run this instance as a public demo.
      - DEMO_DATA_PATH=/app/dbdata/demo
      # Default to the Mailpit sidecar (reachable by service name inside the
      # compose network). Set NUXT_SMTP_HOST/PORT in .env to point the container
      # at a real provider instead (e.g. to test example sending end-to-end).
      - NUXT_SMTP_HOST=${NUXT_SMTP_HOST:-mailpit}
      - NUXT_SMTP_PORT=${NUXT_SMTP_PORT:-1025}
    env_file:
      - .env
    depends_on:
      - mailpit

  mailpit:
    image: axllent/mailpit:latest
    # Host ports remapped to avoid clashing with a host-native Mailpit on
    # 8025/1025. The app reaches Mailpit at mailpit:1025 over the compose
    # network regardless, so only these host-facing URLs change.
    ports:
      - '8125:8025' # web UI  -> http://localhost:8125
      - '1125:1025' # SMTP
    environment:
      - MP_MAX_MESSAGES=500

volumes:
  node_modules:
  dbdata:
